    <title>Mystic Hand Tarot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; background-color: #0f0f12; color: #e2e8f0; font-family: 'Lato', sans-serif; overflow: hidden; }
      h1, h2, h3, button { font-family: 'Cinzel', serif; }
      
      /* Gothic Title Font Override */
      .font-gothic { font-family: 'UnifrakturMaguntia', cursive; }
      
      /* Platinum Text Effect */
      .text-platinum {
        background: linear-gradient(
          -45deg, 
          #e0e0e0 0%, 
          #ffffff 20%, 
          #aaa 45%, 
          #ffffff 55%, 
          #8e9eab 80%, 
          #f0f0f0 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        text-shadow: 
            0px 2px 4px rgba(0,0,0,0.5),
            0px 0px 1px rgba(255,255,255,0.8);
        filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4));
        animation: platinum-shine 4s linear infinite;
      }

      @keyframes platinum-shine {
        to {
          background-position: 200% center;
        }
      }
    </style>
